<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  {% include head.html %}
  <body>
    {% include nav.html %}
    <main id="main-content" class="container">
      {% if page.title and page.show_title != false %}
        <header class="page-header">
          <h1>{{ page.title }}</h1>
          {% if page.lead %}
            <p>{{ page.lead }}</p>
          {% endif %}
        </header>
      {% endif %}
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  </body>
</html>
